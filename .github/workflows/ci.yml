name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macOS catches stat / SELinux / case-sensitivity assumptions
        # that wouldn't show up on a Linux-only matrix. Stays in step
        # with the homelab deploy which is Linux.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  # Build the release binary on its own so a release-only failure
  # (LTO crash, codegen issue, dead-code-with-debug-assertions) doesn't
  # ship to Docker Hub silently.
  release-build:
    name: cargo build --release (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep Linux on Debian bookworm so the prebuilt binary matches the
          # Docker runtime image. macOS entries mirror the release assets.
          - artifact: linux-x86_64
            runner: ubuntu-22.04
          - artifact: macos-aarch64
            runner: macos-15
          - artifact: macos-x86_64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - env:
          TAILWIND_SKIP: "1"
        run: cargo build --release --bin ai-memory
      - uses: actions/upload-artifact@v4
        with:
          name: ci-ai-memory-${{ matrix.artifact }}
          path: target/release/ai-memory

  native-packaging:
    name: native packaging assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/check-native-packaging.sh

  # End-to-end docker smoke: packages the release-build binary and confirms
  # the image runs. Catches Dockerfile drift (missing COPY, bad ENTRYPOINT)
  # before it lands in production without recompiling Rust in Docker.
  docker-smoke:
    name: docker image smoke
    runs-on: ubuntu-latest
    needs: release-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ci-ai-memory-linux-x86_64
          path: dist/docker/ai-memory-linux-x86_64
      - uses: docker/setup-buildx-action@v3
      - name: build image (local tag only)
        run: docker build --target runtime-prebuilt-amd64 -f docker/Dockerfile -t ai-memory:ci .
      - name: --version smoke
        run: docker run --rm ai-memory:ci --version
      - name: bundled hooks present
        run: docker run --rm --entrypoint sh ai-memory:ci -c "ls /usr/local/share/ai-memory/hooks/"
      - name: --help lists the v0.3 subcommands
        run: |
          out=$(docker run --rm ai-memory:ci --help)
          for sub in bootstrap install-mcp install-hooks setup-agent generate-auth-token; do
              echo "$out" | grep -q "$sub" || { echo "missing subcommand: $sub"; exit 1; }
          done

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: >
          cargo audit
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2024-0320

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit reachable
          # from the pushed ref, not just the last one.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Exit nonzero if any secret is found; config lives at the
          # repo root so the same rules apply locally if you also
          # install gitleaks.
          GITLEAKS_CONFIG: .gitleaks.toml
